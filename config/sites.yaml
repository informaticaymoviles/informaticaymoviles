# Definición de las webs de referencia a scrapear.
# IMPORTANTE: revisa robots.txt y T&C de cada web antes de activarla (ver DISCLAIMER.md).
# Los selectores CSS son un PUNTO DE PARTIDA (# TODO) y deben verificarse/ajustarse
# inspeccionando la web real, ya que cambian con el tiempo.

rate_limit_seconds: 3        # segundos mínimos entre peticiones a la MISMA web
timeout_seconds: 15
user_agent: "informaticaymoviles-bot/1.0 (+https://informaticaymoviles.com/bot)"

pc_component_sites:
  pccomponentes:
    enabled: true
    base_url: "https://www.pccomponentes.com"
    # Confirmado por inspección real (13/07/2026): estas rutas y la paginación
    # ?page=N son correctas y devuelven listados server-rendered (no dependen
    # de JS para el HTML inicial), lo cual es buena señal para scraping simple.
    categories:
      cpu: "/procesadores"
      cpu_amd: "/procesadores/amd"     # subcategoría opcional, más rápida de filtrar
      cpu_intel: "/procesadores/intel"
      gpu: "/tarjetas-graficas"
      gpu_nvidia: "/tarjetas-graficas/grafica-nvidia"
      gpu_amd: "/tarjetas-graficas/grafica-amd"
      ram: "/memorias-ram"
      storage: "/discos-duros-ssd"
    pagination:
      query_param: "page"     # ?page=2, ?page=3... confirmado en /procesadores (364 artículos, 10 páginas)
      starts_at: 1
    # IMPORTANTE: no he podido verificar los nombres EXACTOS de clase CSS
    # (mi herramienta de navegación solo me devuelve el contenido ya extraído
    # a texto/markdown, sin atributos HTML). Los selectores de abajo son
    # una base razonable a partir de la estructura observada, pero DEBES
    # confirmarlos con las DevTools del navegador (F12 -> Inspeccionar sobre
    # una tarjeta de producto) antes de poner esto en producción.
    # Patrones de datos confirmados por inspección real:
    #   - precio: texto tipo "424,90€" (con el precio anterior tachado al lado si hay descuento)
    #   - URL de producto: slug plano sin subcarpeta, ej. /amd-ryzen-7-9800x3d-47-52ghz
    #   - título: primeras palabras del texto de la tarjeta, coincide con el <title> del slug
    selectors:
      product_card: "article.product-card"      # TODO: confirmar con DevTools
      name: ".product-card__title"               # TODO: confirmar con DevTools
      price: ".product-card__price"               # TODO: confirmar con DevTools
      link: "a.product-card__link"                # TODO: confirmar con DevTools
      availability: ".product-card__stock"        # TODO: confirmar con DevTools
    # Selectores alternativos "a prueba de cambios de clase", basados en
    # patrones de texto/estructura en vez de nombres de clase (ver
    # src/scrapers/pccomponentes.py -> parse_product_card_by_pattern):
    fallback_pattern:
      price_regex: '(\d{1,3}(?:\.\d{3})*,\d{2})\s*€'
      product_link_regex: '^/[a-z0-9-]+$'   # slugs planos de producto (excluye /categoria/subcategoria)

  mediamarkt:
    enabled: true
    base_url: "https://www.mediamarkt.es"
    # Confirmado por inspección real (13/07/2026).
    categories:
      cpu: "/es/category/procesadores-58.html"
      gpu: "/es/category/tarjetas-gr%C3%A1ficas-63.html"   # "tarjetas-gráficas" URL-encoded
    # ⚠️ HALLAZGO IMPORTANTE: la página NO pagina con ?page=N. Carga solo 12
    # productos y muestra un botón "Mostrar 12 productos más" (273 artículos
    # en /procesadores-58.html). Esto normalmente implica carga adicional vía
    # JavaScript/API (XHR) al pulsar el botón, que un scraper simple con
    # requests+BeautifulSoup NO ejecuta. Antes de depender de este scraper:
    #   1) Abre las DevTools -> pestaña "Red/Network" -> pulsa "Mostrar más
    #      productos" en el navegador -> localiza la petición XHR/fetch que
    #      se dispara (normalmente devuelve JSON) y su URL/parámetros.
    #   2) Llama a ese endpoint JSON directamente desde el scraper en vez de
    #      parsear HTML — es más rápido, más estable y evita esta limitación.
    #   3) Si no se encuentra un endpoint JSON accesible, como alternativa
    #      usar un navegador headless (Playwright/Selenium) que haga clic en
    #      el botón repetidamente antes de extraer el HTML.
    # De momento el scraper solo captura los primeros ~12-24 resultados por
    # categoría hasta que se implemente uno de los dos puntos anteriores.
    pagination:
      type: "load_more_button"   # no es ?page=N como PcComponentes
      note: "Ver comentario arriba: requiere investigar el endpoint XHR o usar navegador headless"
    # Patrón de datos confirmado:
    #   - precio: texto tipo "241,00€" ó "415,84€" (con precio anterior
    #     tachado al lado si hay descuento activo)
    #   - URL de producto: /es/product/_slug-id-numerico.html
    #   - nombre de marca de CPU visible en filtro lateral: AMD / INTEL / etc.
    selectors:
      product_card: "div[data-test=mms-product-card]"   # TODO: confirmar con DevTools
      name: "[data-test=product-title]"                  # TODO: confirmar con DevTools
      price: "[data-test=product-price]"                  # TODO: confirmar con DevTools
      link: "a[data-test=product-title-link]"             # TODO: confirmar con DevTools
      availability: "[data-test=availability]"            # TODO: confirmar con DevTools
    fallback_pattern:
      price_regex: '(\d{1,3}(?:\.\d{3})*,\d{2})\s*€'
      product_link_regex: '^/es/product/_[a-z0-9-]+-\d+\.html$'

  coolmod:
    enabled: true
    base_url: "https://www.coolmod.com"
    # Confirmado por inspección real (13/07/2026).
    categories:
      cpu: "/componentes-pc-procesadores"
      gpu: "/tarjetas-graficas/"
    # ⚠️ HALLAZGO IMPORTANTE: al intentar leer la página de listado con mi
    # herramienta de navegación (que usa una petición HTTP simple, similar a
    # lo que hace `requests`), Coolmod la BLOQUEÓ activamente por detección de
    # bots ("Site blocked the request (bot detection)"). Esto sugiere que:
    #   1) El scraper de este repo, basado en `requests` + cabecera User-Agent
    #      genérica, probablemente también sea bloqueado tal cual.
    #   2) Antes de activarlo en producción, prueba primero con una cabecera
    #      User-Agent de navegador real (no "informaticaymoviles-bot/1.0") y,
    #      si sigue bloqueando, valora usar un navegador headless (Playwright)
    #      con fingerprint de navegador normal, o espaciar mucho más las
    #      peticiones (sube rate_limit_seconds solo para esta tienda).
    #   3) Revisa el robots.txt de coolmod.com y sus condiciones de uso antes
    #      de insistir con peticiones automatizadas repetidas.
    # Patrón de datos confirmado (vía snippets de búsqueda, no HTML crudo):
    #   - precio: texto tipo "423,95€" o "1.599,95€" (con punto de millar)
    #   - disponibilidad: aparece literalmente el texto "Sin Stock" cuando
    #     no hay unidades, o "Envío en 2/15 días" cuando sí hay
    #   - listado con filtros laterales por fabricante/serie/socket
    selectors:
      product_card: ".product-miniature"      # TODO: confirmar con DevTools (no verificable por bot-detection)
      name: ".product-title"                   # TODO: confirmar con DevTools
      price: ".price"                            # TODO: confirmar con DevTools
      link: "a.product-thumbnail"                # TODO: confirmar con DevTools
      availability: ".product-availability"      # TODO: confirmar con DevTools
    fallback_pattern:
      price_regex: '(\d{1,3}(?:\.\d{3})*,\d{2})\s*€'
      out_of_stock_text: "Sin Stock"

  neobyte:
    enabled: true
    base_url: "https://www.neobyte.es"
    categories:
      cpu: "/procesadores"
      gpu: "/tarjetas-graficas"
    selectors:
      product_card: ".product-item"
      name: ".product-item__name"
      price: ".product-item__price"
      link: "a.product-item__link"
      availability: ".product-item__stock"

  amazon_es:
    enabled: false   # Amazon exige API/afiliación oficial; ver nota abajo
    base_url: "https://www.amazon.es"
    note: >
      Amazon bloquea de forma muy agresiva el scraping tradicional y sus T&C lo
      prohíben expresamente fuera de su Product Advertising API. Se recomienda
      usar la API oficial de Amazon (PA-API, requiere cuenta de afiliados) en
      lugar del scraper HTML incluido aquí como plantilla desactivada.
    selectors:
      product_card: "div[data-component-type=s-search-result]"
      name: "h2 span"
      price: ".a-price .a-offscreen"
      link: "h2 a"
      availability: ".a-color-success, .a-color-price"

phone_tablet_sites:
  pccomponentes_moviles:
    enabled: true
    base_url: "https://www.pccomponentes.com"
    categories:
      phones: "/smartphones"
      tablets: "/tablets"
    selectors:
      product_card: "article.product-card"
      name: ".product-card__title"
      price: ".product-card__price"
      link: "a.product-card__link"
      availability: ".product-card__stock"

  backmarket:
    enabled: true
    base_url: "https://www.backmarket.es"
    categories:
      phones: "/es-es/l/moviles/1"
      tablets: "/es-es/l/tablets/29"
    selectors:
      product_card: "[data-qa=productCard]"
      name: "[data-qa=productCardTitle]"
      price: "[data-qa=productCardPrice]"
      link: "a[data-qa=productCardLink]"
      availability: "[data-qa=productCardStock]"

  corteingles:
    enabled: true
    base_url: "https://www.elcorteingles.es"
    categories:
      phones: "/electronica/moviles-y-smartphones/"
      tablets: "/electronica/tablets/"
    selectors:
      product_card: ".product_preview-productPreview"
      name: ".product_preview-title"
      price: ".product_preview-price"
      link: "a.product_preview-link"
      availability: ".product_preview-availability"

  carrefour:
    enabled: true
    base_url: "https://www.carrefour.es"
    categories:
      phones: "/tecnologia/telefonia/smartphones/"
      tablets: "/tecnologia/informatica/tablets/"
    selectors:
      product_card: ".product-card"
      name: ".product-card__title"
      price: ".product-card__price"
      link: "a.product-card__link"
      availability: ".product-card__stock"
